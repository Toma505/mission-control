name: Desktop Builds

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows artifacts
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          MC_LICENSE_SECRET: ${{ secrets.MC_LICENSE_SECRET }}
        run: |
          npm run prepare:icon
          npm run build
          npm run prepare:license
          npx electron-builder --win --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mission-control-windows
          path: |
            release/*.exe
            release/*.blockmap
            release/*.yml
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS artifacts
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          MC_LICENSE_SECRET: ${{ secrets.MC_LICENSE_SECRET }}
        run: |
          npm run prepare:icon
          npm run build
          npm run prepare:license
          npx electron-builder --mac --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mission-control-macos
          path: |
            release/*.dmg
            release/*.blockmap
            release/*.yml
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm
          gem install --no-document fpm

      - name: Install dependencies
        run: npm ci

      - name: Build Linux artifacts
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          MC_LICENSE_SECRET: ${{ secrets.MC_LICENSE_SECRET }}
        run: |
          npm run prepare:icon
          npm run build
          npm run prepare:license
          npx electron-builder --linux --publish never

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mission-control-linux
          path: |
            release/*.AppImage
            release/*.deb
            release/*.blockmap
            release/*.yml
          if-no-files-found: error
