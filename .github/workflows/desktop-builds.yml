name: Desktop Builds

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows artifacts
        env:
          # Code signing — set WIN_CSC_LINK and WIN_CSC_KEY_PASSWORD as
          # GitHub repo secrets once the OV certificate (.pfx) is acquired.
          # Until then, builds are unsigned but functional.
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.WIN_CSC_LINK != '' && 'true' || 'false' }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          MC_LICENSE_SECRET: ${{ secrets.MC_LICENSE_SECRET }}
        run: |
          npm run prepare:icon
          npm run build
          npx electron-builder --win --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mission-control-windows
          path: |
            release/*.exe
            release/*.blockmap
            release/*.yml
          if-no-files-found: error

  build-macos:
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS artifacts
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          MC_LICENSE_SECRET: ${{ secrets.MC_LICENSE_SECRET }}
        run: |
          npm run prepare:icon
          npm run build
          npx electron-builder --mac --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mission-control-macos
          path: |
            release/*.dmg
            release/*.blockmap
            release/*.yml
          if-no-files-found: error

  build-linux:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm
          gem install --no-document fpm

      - name: Install dependencies
        run: npm ci

      - name: Build Linux artifacts
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          MC_LICENSE_SECRET: ${{ secrets.MC_LICENSE_SECRET }}
        run: |
          npm run prepare:icon
          npm run build
          npx electron-builder --linux --publish never

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mission-control-linux
          path: |
            release/*.AppImage
            release/*.deb
            release/*.blockmap
            release/*.yml
          if-no-files-found: error

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - build-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag matches package version
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mission-control-*
          merge-multiple: true
          path: release-assets

      - name: Verify release asset set
        shell: bash
        run: |
          ls -la release-assets
          test -f release-assets/latest.yml

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/*
